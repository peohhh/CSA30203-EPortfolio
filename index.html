<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA30203 E-Portfolio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#08080c;
  color:white;
  line-height:1.6;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:15px;
  text-align:center;
  z-index:1000;
  border-bottom:1px solid #ff4fb8;
}

nav a{
  color:#ff8bd4;
  text-decoration:none;
  margin:0 10px;
  font-weight:bold;
}

nav a:hover{
  color:white;
}

.page{
  min-height:100vh;
  padding:100px 8% 60px;
}

.hero{
  background:linear-gradient(135deg,#ff4fb8,#111,#050505);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.profile-img{
  width:180px;
  height:180px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
  margin-bottom:20px;
}

.hero h1{
  font-size:45px;
  margin-bottom:10px;
}

.hero h2{
  color:#ffd6ef;
  margin-bottom:15px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  background:#ff4fb8;
  color:white;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

.btn:hover{
  background:white;
  color:#ff4fb8;
}

h2{
  color:#ff5fc0;
  margin-bottom:25px;
  border-left:6px solid #ff5fc0;
  padding-left:12px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:22px;
}

.card{
  background:#17171f;
  padding:25px;
  border-radius:18px;
  border:1px solid #ff4fb8;
  box-shadow:0 0 18px rgba(255,79,184,0.25);
}

.card h3{
  color:#ff9bd8;
  margin-bottom:12px;
}

.kpi{
  font-size:35px;
  color:#ff4fb8;
  font-weight:bold;
}

.skill{
  margin-bottom:18px;
}

.bar{
  width:100%;
  background:#333;
  border-radius:20px;
  overflow:hidden;
  height:18px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#ff4fb8,#ffaadf);
}

.timeline{
  border-left:4px solid #ff4fb8;
  padding-left:25px;
}

.timeline-box{
  background:#17171f;
  padding:20px;
  margin-bottom:20px;
  border-radius:15px;
  border:1px solid #ff4fb8;
}

.project img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #ff4fb8;
  background:#222;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  border:1px solid #ff4fb8;
  padding:12px;
  text-align:left;
}

th{
  background:#2a1022;
  color:#ff9bd8;
}

ul{
  margin-left:20px;
